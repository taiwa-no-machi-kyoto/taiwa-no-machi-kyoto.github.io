    <line id="front_dim_height_line" x1="680" y1="0" x2="680" y2="235" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="front_dim_height_text" x="700" y="122" class="dim">420mm</text>

    <line id="front_dim_left_offset_line" x1="40" y1="270" x2="115" y2="270" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="front_dim_left_offset_text" x="78" y="295" text-anchor="middle" class="dim">150mm</text>
    <line id="front_dim_right_offset_line" x1="565" y1="270" x2="640" y2="270" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="front_dim_right_offset_text" x="603" y="295" text-anchor="middle" class="dim">150mm</text>

    <line id="front_left_leg_guide_line" x1="115" y1="45" x2="115" y2="260" class="dash"/>
    <line id="front_right_leg_guide_line" x1="565" y1="45" x2="565" y2="260" class="dash"/>

    <text id="front_center_brace_label" x="245" y="135" class="label">中央補強材 1000mm</text>
    <text id="front_leg_left_label" x="80" y="250" class="label">脚材</text>
    <text id="front_leg_right_label" x="510" y="250" class="label">脚材</text>
  </g>

  <rect id="cut_panel" x="40" y="1150" width="720" height="520" class="panel"/>
  <text id="cut_title" x="70" y="1190" class="subtitle">5. 部材カットリスト</text>

  <g id="cut_view" transform="translate(90,1245)">
    <rect id="cut_seat_1" x="0" y="0" width="600" height="34" class="wood"/>
    <rect id="cut_seat_2" x="0" y="45" width="600" height="34" class="wood"/>
    <rect id="cut_seat_3" x="0" y="90" width="600" height="34" class="wood"/>
    <text id="cut_seat_label" x="0" y="-5" class="label">座面材 1200mm × 3本</text>

    <rect id="cut_leg_1" x="0" y="160" width="190" height="34" class="leg"/>
    <rect id="cut_leg_2" x="210" y="160" width="190" height="34" class="leg"/>
    <rect id="cut_leg_3" x="0" y="205" width="190" height="34" class="leg"/>
    <rect id="cut_leg_4" x="210" y="205" width="190" height="34" class="leg"/>
    <text id="cut_leg_label" x="420" y="186" class="label">脚材 380mm × 4本</text>

    <rect id="cut_brace_1" x="0" y="280" width="125" height="34" class="brace"/>
    <rect id="cut_brace_2" x="145" y="280" width="125" height="34" class="brace"/>
    <rect id="cut_brace_3" x="290" y="280" width="125" height="34" class="brace"/>
    <rect id="cut_brace_4" x="435" y="280" width="125" height="34" class="brace"/>
    <text id="cut_brace_label" x="0" y="270" class="label">横補強材 250mm × 4本</text>

    <rect id="cut_center_brace_1" x="0" y="350" width="500" height="34" class="brace"/>
    <rect id="cut_center_brace_2" x="0" y="390" width="500" height="34" class="brace"/>
    <text id="cut_center_brace_label" x="520" y="394" class="label">中央補強材 1000mm × 2本</text>
  </g>

  <rect id="step_panel" x="800" y="1150" width="760" height="520" class="panel"/>
  <text id="step_title" x="830" y="1190" class="subtitle">6. 組み立て工程図</text>

  <g id="step_view" transform="translate(835,1235)">
    <g id="step_1_group">
      <text id="step_1_label" x="0" y="0" class="label">① 座面板3本を並べる</text>
      <rect id="step_1_seat_1" x="0" y="20" width="180" height="20" class="wood"/>
      <rect id="step_1_seat_2" x="0" y="48" width="180" height="20" class="wood"/>
      <rect id="step_1_seat_3" x="0" y="76" width="180" height="20" class="wood"/>
      <text id="step_1_note" x="0" y="120" class="small">隙間5〜10mmを確保</text>
    </g>

    <g id="step_2_group" transform="translate(250,0)">
      <text id="step_2_label" x="0" y="0" class="label">② 裏側に横補強材</text>
      <rect id="step_2_seat_1" x="0" y="20" width="180" height="20" class="wood"/>
      <rect id="step_2_seat_2" x="0" y="48" width="180" height="20" class="wood"/>
      <rect id="step_2_seat_3" x="0" y="76" width="180" height="20" class="wood"/>
      <rect id="step_2_brace_left" x="25" y="20" width="18" height="76" class="brace"/>
      <rect id="step_2_brace_right" x="137" y="20" width="18" height="76" class="brace"/>
      <circle id="step_2_screw_01" cx="34" cy="30" r="3" class="screw"/>
      <circle id="step_2_screw_02" cx="34" cy="58" r="3" class="screw"/>
      <circle id="step_2_screw_03" cx="34" cy="86" r="3" class="screw"/>
      <circle id="step_2_screw_04" cx="146" cy="30" r="3" class="screw"/>
      <circle id="step_2_screw_05" cx="146" cy="58" r="3" class="screw"/>
      <circle id="step_2_screw_06" cx="146" cy="86" r="3" class="screw"/>
      <text id="step_2_note" x="0" y="120" class="small">左右端から150mm内側</text>
    </g>

    <g id="step_3_group" transform="translate(500,0)">
      <text id="step_3_label" x="0" y="0" class="label">③ 脚4本を固定</text>
      <rect id="step_3_seat_1" x="25" y="20" width="43" height="25" class="wood"/>
      <rect id="step_3_seat_2" x="68" y="20" width="43" height="25" class="wood"/>
      <rect id="step_3_seat_3" x="111" y="20" width="44" height="25" class="wood"/>
      <rect id="step_3_leg_left" x="28" y="59" width="20" height="66" class="leg"/>
      <rect id="step_3_leg_right" x="132" y="59" width="20" height="66" class="leg"/>
      <rect id="step_3_brace_under_seat" x="25" y="45" width="130" height="14" class="brace"/>
      <text id="step_3_note" x="0" y="150" class="small">前後左右に脚を配置</text>
    </g>

    <g id="step_4_group" transform="translate(0,220)">
      <text id="step_4_label" x="0" y="0" class="label">④ 中央補強材を入れる</text>
      <rect id="step_4_seat" x="0" y="25" width="210" height="25" class="wood"/>
      <rect id="step_4_leg_left" x="30" y="50" width="22" height="90" class="leg"/>
      <rect id="step_4_leg_right" x="158" y="50" width="22" height="90" class="leg"/>
      <rect id="step_4_center_brace" x="45" y="95" width="125" height="16" class="brace"/>
      <text id="step_4_note" x="0" y="165" class="small">長手方向に1000mm材を渡す</text>
    </g>

    <g id="step_5_group" transform="translate(300,220)">
      <text id="step_5_label" x="0" y="0" class="label">⑤ 仕上げ・安全確認</text>
      <rect id="step_5_finished_seat" x="0" y="30" width="230" height="36" class="wood" rx="8"/>
      <text id="step_5_note_1" x="0" y="95" class="small">角を丸める／ネジ頭を沈める</text>
      <text id="step_5_note_2" x="0" y="120" class="small">屋外用防腐・防水塗装を2回</text>
      <text id="step_5_note_3" x="0" y="145" class="small">ぐらつき・ささくれを確認</text>
    </g>
  </g>

  <rect id="notes_panel" x="40" y="1680" width="1520" height="470" class="panel"/>
  <text id="notes_title" x="70" y="1720" class="subtitle">施工メモ・安全注意</text>

  <g id="notes_view" transform="translate(80,1745)">
    <text id="note_01" x="0" y="0" class="note">● 木材断面目安：2×4材 約38mm × 89mm。座面は3本並べると奥行約267mm＋隙間となるため、余裕を見て完成奥行350mm以内に収める。</text>
    <text id="note_02" x="0" y="35" class="note">● 座面下の横補強材250mmは、座面3本を束ねる向きで取り付ける。左右端から150mm内側が基本位置。</text>
    <text id="note_03" x="0" y="70" class="note">● 脚4本は左右2か所・前後2か所。横補強材と脚を確実にネジ固定し、荷重が逃げないようにする。</text>
    <text id="note_04" x="0" y="105" class="note">● 中央補強材1000mmは長手方向に通し、左右の脚部をつないで横揺れを抑える。</text>
    <text id="note_05" x="0" y="140" class="note">● ネジは65mm程度を目安。木割れ防止のため下穴を開ける。座面1本につき各補強材へ2本ずつが目安。</text>
    <text id="note_06" x="0" y="175" class="note">● 角は必ず紙やすりで丸める。触って痛い箇所、衣服が引っかかる箇所を残さない。</text>
    <text id="note_07" x="0" y="210" class="note">● ネジ頭は表面から飛び出さないように沈める。屋外設置では防腐・防水塗料を塗る。</text>
    <text id="note_08" x="0" y="245" class="note">● 設置前に、大人2〜3人が座ってもぐらつかないこと、通行の妨げにならないことを確認する。</text>
    <text id="tools_title" x="0" y="295" class="subtitle">必要道具</text>
    <text id="tools_note" x="0" y="330" class="note">のこぎりまたは丸ノコ／電動ドライバー／下穴用ドリル／メジャー／さしがね／クランプ／紙やすり／刷毛</text>
  </g>
</svg>
