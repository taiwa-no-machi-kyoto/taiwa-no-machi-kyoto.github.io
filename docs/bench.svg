<svg id="bench_blueprint_svg" xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <defs id="svg_defs">
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path id="arrow_path" d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>

    <pattern id="woodgrain" width="80" height="20" patternUnits="userSpaceOnUse">
      <rect id="woodgrain_base" width="80" height="20" fill="#f3c27a"/>
      <path id="woodgrain_line_1" d="M0 5 C20 0, 40 10, 80 4" stroke="#d49a55" stroke-width="1" fill="none" opacity="0.45"/>
      <path id="woodgrain_line_2" d="M0 15 C25 8, 45 20, 80 13" stroke="#d49a55" stroke-width="1" fill="none" opacity="0.35"/>
    </pattern>

    <style id="svg_style">
      .title{font-family:sans-serif;font-size:34px;font-weight:700;fill:#222}
      .subtitle{font-family:sans-serif;font-size:24px;font-weight:700;fill:#222}
      .label{font-family:sans-serif;font-size:18px;fill:#222}
      .small{font-family:sans-serif;font-size:15px;fill:#222}
      .note{font-family:sans-serif;font-size:16px;fill:#222}
      .dim{font-family:sans-serif;font-size:17px;fill:#111;font-weight:700}
      .line{stroke:#333;stroke-width:2;fill:none}
      .thin{stroke:#555;stroke-width:1.5;fill:none}
      .dash{stroke:#555;stroke-width:2;stroke-dasharray:8 6;fill:none}
      .wood{fill:url(#woodgrain);stroke:#333;stroke-width:2}
      .brace{fill:#c78a45;stroke:#333;stroke-width:2}
      .leg{fill:#d8a15a;stroke:#333;stroke-width:2}
      .screw{fill:#444;stroke:#111;stroke-width:1}
      .panel{fill:#fffdf8;stroke:#ccc;stroke-width:2;rx:12}
    </style>
  </defs>

  <rect id="background" x="0" y="0" width="1600" height="2200" fill="#fff"/>
  <text id="main_title" x="800" y="55" text-anchor="middle" class="title">置きベン 詳細組み立て図｜2〜3人用・背もたれなしベンチ</text>
  <text id="main_size_label" x="800" y="90" text-anchor="middle" class="label">完成寸法：幅1200mm × 奥行350mm × 高さ420mm ／ 主材料：2×4材</text>

  <rect id="perspective_panel" x="40" y="120" width="720" height="520" class="panel"/>
  <text id="perspective_title" x="70" y="160" class="subtitle">1. 完成斜視図</text>

  <g id="perspective_view" transform="translate(120,210)">
    <polygon id="perspective_seat_1" points="-20,80 460,80 540,130 60,130" class="wood"/>
    <polygon id="perspective_seat_2" points="-20,125 460,125 540,175 60,175" class="wood"/>

    <polygon id="perspective_brace_right_lower_depth" points="480,285 570,330 570,355 480,310" class="brace"/>
    <polygon id="perspective_leg_front_right" points="520,225 550,242 550,390 520,373" class="leg"/>
    <polygon id="perspective_leg_back_right" points="448,190 478,207 478,355 448,338" class="leg"/>

    <polygon id="perspective_center_brace_front" points="30,265 525,265 525,290 30,290" class="brace"/>
    <polygon id="perspective_center_brace_back" points="45,320 540,320 540,345 45,345" class="brace"/>
    <polygon id="perspective_brace_left_depth" points="20,205 110,250 110,275 20,230" class="brace"/>
    <polygon id="perspective_brace_right_depth" points="450,205 540,250 540,275 450,230" class="brace"/>

    <polygon id="perspective_leg_front_left" points="60,225 90,242 90,390 60,373" class="leg"/>
    <polygon id="perspective_leg_back_left" points="-10,190 20,207 20,355 -10,338" class="leg"/>

    <polygon id="perspective_brace_left_lower_depth" points="0,285 90,330 90,355 0,310" class="brace"/>
    <polygon id="perspective_seat_3" points="-20,170 460,170 540,220 60,220" class="wood"/>

    <circle id="perspective_screw_01" cx="60" cy="105" r="4" class="screw"/>
    <circle id="perspective_screw_02" cx="120" cy="105" r="4" class="screw"/>
    <circle id="perspective_screw_03" cx="400" cy="105" r="4" class="screw"/>
    <circle id="perspective_screw_04" cx="460" cy="105" r="4" class="screw"/>
    <circle id="perspective_screw_05" cx="65" cy="150" r="4" class="screw"/>
    <circle id="perspective_screw_06" cx="125" cy="150" r="4" class="screw"/>
    <circle id="perspective_screw_07" cx="405" cy="150" r="4" class="screw"/>
    <circle id="perspective_screw_08" cx="465" cy="150" r="4" class="screw"/>
    <circle id="perspective_screw_09" cx="70" cy="195" r="4" class="screw"/>
    <circle id="perspective_screw_10" cx="130" cy="195" r="4" class="screw"/>
    <circle id="perspective_screw_11" cx="410" cy="195" r="4" class="screw"/>
    <circle id="perspective_screw_12" cx="470" cy="195" r="4" class="screw"/>

    <text id="perspective_seat_label" x="150" y="60" class="label">座面材 1200mm × 3本</text>
    <line id="perspective_seat_label_arrow" x1="235" y1="65" x2="260" y2="95" class="thin" marker-end="url(#arrow)"/>

    <text id="perspective_leg_label" x="370" y="295" class="label">脚材 380mm × 4本</text>
    <line id="perspective_leg_label_arrow" x1="445" y1="300" x2="465" y2="345" class="thin" marker-end="url(#arrow)"/>

    <text id="perspective_center_brace_label" x="110" y="300" class="label">中央補強材 1000mm</text>
    <line id="perspective_center_brace_label_arrow" x1="210" y1="305" x2="250" y2="333" class="thin" marker-end="url(#arrow)"/>

    <text id="perspective_side_brace_label" x="-80" y="265" class="label">横補強材 250mm</text>
    <line id="perspective_side_brace_label_arrow" x1="40" y1="260" x2="70" y2="235" class="thin" marker-end="url(#arrow)"/>
  </g>

  <rect id="top_panel" x="800" y="120" width="760" height="520" class="panel"/>
  <text id="top_title" x="830" y="160" class="subtitle">2. 上面図｜座面と裏側補強位置</text>

  <g id="top_view" transform="translate(880,220)">
    <rect id="top_seat_1" x="0" y="0" width="600" height="55" class="wood"/>
    <rect id="top_seat_2" x="0" y="65" width="600" height="55" class="wood"/>
