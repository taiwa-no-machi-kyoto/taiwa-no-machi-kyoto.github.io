    <line id="top_dim_depth_line" x1="630" y1="0" x2="630" y2="185" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="top_dim_depth_text" x="650" y="97" class="dim">350mm</text>

    <line id="top_dim_gap_line" x1="612" y1="55" x2="612" y2="65" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="top_dim_gap_text" x="625" y="65" class="small">隙間 5〜10mm</text>

    <line id="top_dim_left_offset_line" x1="0" y1="225" x2="75" y2="225" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="top_dim_left_offset_text" x="38" y="250" text-anchor="middle" class="dim">150mm</text>

    <line id="top_dim_right_offset_line" x1="525" y1="225" x2="600" y2="225" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="top_dim_right_offset_text" x="563" y="250" text-anchor="middle" class="dim">150mm</text>

    <text id="top_brace_label" x="105" y="215" class="label">破線：座面裏の横補強材</text>
    <text id="top_note_label" x="0" y="285" class="note">座面板3本は奥行方向に並べる。1200mm方向がベンチの横幅。</text>
  </g>

  <rect id="side_panel" x="800" y="680" width="760" height="430" class="panel"/>
  <text id="side_title" x="830" y="720" class="subtitle">4. 側面図｜奥行・固定関係</text>

  <g id="side_view" transform="translate(900,790)">
    <rect id="side_seat_1" x="80" y="0" width="109" height="45" class="wood"/>
    <rect id="side_seat_2" x="191" y="0" width="109" height="45" class="wood"/>
    <rect id="side_seat_3" x="301" y="0" width="109" height="45" class="wood"/>
    <rect id="side_leg_front" x="110" y="45" width="42" height="190" class="leg"/>
    <rect id="side_leg_back" x="338" y="45" width="42" height="190" class="leg"/>
    <rect id="side_brace_under_seat" x="95" y="45" width="300" height="28" class="brace"/>
    <rect id="side_center_brace" x="120" y="145" width="245" height="24" class="brace"/>

    <circle id="side_screw_01" cx="125" cy="58" r="4" class="screw"/>
    <circle id="side_screw_02" cx="142" cy="58" r="4" class="screw"/>
    <circle id="side_screw_03" cx="353" cy="58" r="4" class="screw"/>
    <circle id="side_screw_04" cx="370" cy="58" r="4" class="screw"/>
    <circle id="side_screw_05" cx="135" cy="155" r="4" class="screw"/>
    <circle id="side_screw_06" cx="350" cy="155" r="4" class="screw"/>

    <line id="side_dim_depth_line" x1="80" y1="-35" x2="410" y2="-35" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="side_dim_depth_text" x="245" y="-50" text-anchor="middle" class="dim">350mm</text>
    <line id="side_dim_height_line" x1="450" y1="0" x2="450" y2="235" class="line" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text id="side_dim_height_text" x="470" y="122" class="dim">420mm</text>

    <text id="side_brace_label" x="105" y="105" class="label">横補強材 250mm</text>
    <line id="side_brace_label_arrow" x1="230" y1="103" x2="260" y2="75" class="thin" marker-end="url(#arrow)"/>
    <text id="side_fix_label" x="130" y="205" class="label">脚を座面裏へネジ固定</text>
    <text id="side_note_label" x="80" y="285" class="note">横補強材が座面3本を束ね、脚を受ける。脚は前後2本で荷重を支える。</text>
  </g>

  <rect id="front_panel" x="40" y="680" width="720" height="430" class="panel"/>
  <text id="front_title" x="70" y="720" class="subtitle">3. 正面図｜高さ・脚・中央補強材</text>

  <g id="front_view" transform="translate(100,780)">
